<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Consultor Pokémon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

  <!-- Formas decorativas -->
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <!-- CABECERA -->
  <header class="hero container">

    <p class="eyebrow">PokéAPI</p>

    <h1>Consultor Interactivo Pokémon</h1>

    <p class="hero-copy">
      Busca Pokémon por nombre o número de ID y consulta información detallada.
    </p>

  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="container">

    <!-- BUSCADOR -->
    <section class="panel search-panel" aria-label="Buscador Pokémon">

      <form id="searchForm" class="search-form">

        <div class="field-group field-grow">

          <label for="query">Nombre o ID</label>

          <input
            id="query"
            name="query"
            type="text"
            placeholder="Ej.: Pikachu o 25"
            autocomplete="off"
            required
          >

        </div>

        <button type="submit" id="searchBtn">
          Buscar
        </button>

      </form>

      <!-- BÚSQUEDAS RÁPIDAS -->
      <div class="quick-filters" aria-label="Búsquedas rápidas">

        <button class="chip" data-pokemon="pikachu">
          Pikachu
        </button>

        <button class="chip" data-pokemon="charizard">
          Charizard
        </button>

        <button class="chip" data-pokemon="bulbasaur">
          Bulbasaur
        </button>

        <button class="chip" data-pokemon="squirtle">
          Squirtle
        </button>

        <button class="chip" data-pokemon="piplup">
          Piplup
        </button>

      </div>

    </section>

    <!-- MENSAJES DE ESTADO -->
    <section
      id="status"
      class="status"
      role="status"
      aria-live="polite">
    </section>

    <!-- RESULTADOS -->
    <section aria-label="Resultados Pokémon">

      <div class="results-head">

        <h2>Información del Pokémon</h2>

      </div>

      <div id="results" class="results-grid"></div>

    </section>

  </main>

  <!-- TEMPLATE DE TARJETA -->
  <template id="pokemonCardTemplate">

    <article class="pokemon-card">

      <!-- IMAGEN -->
      <div class="pokemon-image-wrap">

        <img
          class="pokemon-image"
          alt="Sprite del Pokémon"
          loading="lazy"
        >

      </div>

      <!-- CONTENIDO -->
      <div class="pokemon-content">

        <h3 class="pokemon-name"></h3>

        <p class="pokemon-id"></p>

        <!-- TIPOS -->
        <div class="pokemon-section">

          <h4>Tipos</h4>

          <div class="pokemon-types"></div>

        </div>

        <!-- HABILIDADES -->
        <div class="pokemon-section">

          <h4>Habilidades</h4>

          <ul class="pokemon-abilities"></ul>

        </div>

        <!-- ESTADÍSTICAS -->
        <div class="pokemon-section">

          <h4>Estadísticas Base</h4>

          <ul class="pokemon-stats"></ul>

        </div>

        <!-- MOVIMIENTOS -->
        <div class="pokemon-section">

          <h4>Movimientos</h4>

          <ul class="pokemon-moves"></ul>

        </div>

        <!-- EVOLUCIONES -->
        <div class="pokemon-section">

          <h4>Evoluciones</h4>

          <div class="pokemon-evolutions"></div>

        </div>

      </div>

    </article>

  </template>

  <!-- SCRIPT -->
  <script src="js/app.js" defer></script>

</body>
</html>
